# This is a basic workflow to help you get started with Actions

name: Build kernel

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "master" branch
  push:
    tags:
      - '*'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    name: Build kernel
    runs-on: ubuntu-latest
    container: quay.io/droidian/build-essential:current-amd64

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          ref: melt-rebase
          
      - name: Update & install dependencies
        run: |
          apt update
          apt install curl aria2 git fakeroot build-essential ncurses-dev xz-utils libssl-dev bc flex libelf-dev bison build-essential dpkg-dev findutils android-platform-prebuilts-python-linux-x86-2.7.5 bc rsync kmod cpio bison flex libssl-dev binutils-aarch64-linux-gnu lz4 -y
          aria2c -x 10 -s 10 -j 10 https://github.com/llvm/llvm-project/releases/download/llvmorg-20.1.3/LLVM-20.1.3-Linux-X64.tar.xz -o clang.tar.xz -d /
          mkdir /clang
          tar -xvf /clang.tar.xz -C /clang
          mv /clang/*/* /clang/
          mkdir -p /android-kernel/
          git clone https://android.googlesource.com/kernel/build -b android-12.1.0_r0.40 /android-kernel/build

      - name: Build kernel
        run: |
          export PATH=/opt/android/prebuilts/python/2.7.5/bin:$PATH
          ./build.sh -- Image
          ls /out

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-kernel
          path: /out/*
          if-no-files-found: error
          retention-days: 1
