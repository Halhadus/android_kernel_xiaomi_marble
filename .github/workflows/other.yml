# This is a basic workflow to help you get started with Actions

name: Build other

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "master" branch
  push:
    tags:
      - '*'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    name: Build other
    runs-on: ubuntu-latest
    container: quay.io/droidian/build-essential:current-amd64

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          ref: melt-rebase
          
      - name: Update & install dependencies
        run: |
          apt update
          apt install zip curl git fakeroot build-essential ncurses-dev xz-utils libssl-dev bc flex libelf-dev bison build-essential dpkg-dev findutils android-platform-prebuilts-python-linux-x86-2.7.5 bc rsync kmod cpio bison flex libssl-dev binutils-aarch64-linux-gnu lz4 clang-android-12.0-r416183b -y
          mkdir -p /android-kernel/
          git clone https://android.googlesource.com/kernel/build -b android-12.1.0_r0.40 /android-kernel/build

      - name: Build other
        run: |
          export PATH=/opt/android/prebuilts/python/2.7.5/bin:$PATH
          ./build_lxc.sh
          cd /outmelt
          zip -r /out/melt-other.zip .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-kernel
          path: /out/melt-other.zip
          if-no-files-found: error
          retention-days: 1

  prepare:
    runs-on: ubuntu-latest
    name: Create GitHub release
    needs: build

    steps:
      - name: Delete old latest-other release
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          delete_release: true
          tag_name: latest-other
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag latest-other
        uses: tvdias/github-tagger@v0.0.1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          tag: latest-other

  publish:
    runs-on: ubuntu-latest
    needs: prepare

    name: Publish linux-kernel

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: out

      - name: Create latest-other release
        uses: softprops/action-gh-release@v2.2.1
        with:
          files: out/*
          tag_name: latest-other
          draft: false
          prerelease: false

